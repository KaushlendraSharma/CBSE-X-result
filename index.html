<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CBSE 2026 RESULT X nic
  </title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    h1 {
      color: #d32f2f;
      font-size: 28px;
    }
    p {
      color: #555;
      margin-top: 10px;
    }
    .retry {
      margin-top: 20px;
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .retry:hover {
      background: #0d47a1;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>⚠️ Server Busy</h1>
    <p>Due to heavy traffic, the server is temporarily unavailable.</p>
    <p>Please try again after some time.</p>
    <button class="retry" onclick="location.reload()">Retry</button>
  </div>

</body>
</html>
